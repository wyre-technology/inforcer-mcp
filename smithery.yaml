# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - inforcerRegion
      - inforcerApiKey
    properties:
      inforcerRegion:
        type: string
        description: Inforcer API region (anz, eu, uk, us)
      inforcerApiKey:
        type: string
        description: Your Inforcer API key
  commandFunction: |-
    (config) => ({ command: 'node', args: ['dist/index.js'], env: { INFORCER_REGION: config.inforcerRegion, INFORCER_API_KEY: config.inforcerApiKey, MCP_TRANSPORT: 'stdio' } })
